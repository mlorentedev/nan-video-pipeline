# nginx server for the static Astro/Starlight build.
# Listens on 8080 so it works as a non-root user on restricted clusters
# (NaN Cloud / Kubernetes / OpenShift). Match this with the "Container port"
# field in the NaN Cloud panel.
server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Astro builds pretty URLs as <page>/index.html. Resolve a request to the
    # file, then the directory index, before giving up with the custom 404.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Starlight emits a styled 404.html at the site root.
    error_page 404 /404.html;

    # Long cache for fingerprinted assets, no cache for HTML entry points.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
