name: Deploy to GitHub Pages

# Plan B alongside NaN Cloud: publishes the same Astro/Starlight build to
# https://<owner>.github.io/<repo>/ . The base path is derived from the repo
# name at build time, so it keeps working even if the repo is renamed.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build (sub-path base for project Pages)
        env:
          SITE_BASE: /${{ github.event.repository.name }}/
          SITE_URL: https://${{ github.repository_owner }}.github.io
        run: yarn build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
